    <style>
        /* Estilos específicos para login con diseño moderno */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0A0E27 0%, #1A1F3A 50%, #0A0E27 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-30px, 30px) rotate(5deg); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: var(--spacing-lg);
        }

        .login-card {
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-2xl);
            padding: var(--spacing-3xl);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInScale 0.6s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .login-logo {
            height: 80px;
            margin-bottom: var(--spacing-lg);
            filter: drop-shadow(0 4px 12px rgba(0, 102, 255, 0.3));
        }

        .login-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: var(--spacing-xs);
        }

        .login-subtitle {
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            font-weight: var(--font-weight-semibold);
            margin-bottom: var(--spacing-sm);
            color: var(--color-text);
            font-size: var(--font-size-sm);
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            font-size: var(--font-size-base);
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            color: var(--color-text);
            transition: all var(--transition-base);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        .form-input::placeholder {
            color: var(--color-text-tertiary);
        }

        .form-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-xl);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: var(--font-size-sm);
            cursor: pointer;
        }

        .forgot-password {
            font-size: var(--font-size-sm);
            color: var(--color-primary);
            transition: color var(--transition-fast);
        }

        .forgot-password:hover {
            color: var(--color-secondary);
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 102, 255, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: var(--spacing-xl) 0;
            padding-top: var(--spacing-xl);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .divider-text {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
            transition: all var(--transition-fast);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
        }

        .back-link:hover {
            color: var(--color-text);
            background: rgba(255, 255, 255, 0.05);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-lg);
            font-size: var(--font-size-sm);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #FCA5A5;
        }

        /* Animación de fondo flotante */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: floatOrb 15s ease-in-out infinite;
        }

        .bg-orb-1 {
            top: 10%;
            left: 10%;
            width: 300px;
            height: 300px;
            background: rgba(0, 102, 255, 0.3);
            animation-delay: 0s;
        }

        .bg-orb-2 {
            bottom: 10%;
            right: 10%;
            width: 400px;
            height: 400px;
            background: rgba(0, 217, 255, 0.2);
            animation-delay: 5s;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.1); }
        }
    </style>
</head>

<body>
    <!-- Orbs de fondo -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="../assets/images/upla.png" alt="UPLA Logo" class="login-logo" onerror="this.style.display='none'">
                <h1 class="login-title">
                    CORONEL<span class="logo-accent">_GUEVARA</span>
                </h1>
                <p class="login-subtitle">Arquitectura de Software 2026</p>
            </div>

            <form id="loginForm">
                <div id="errorMessage" class="alert alert-error" style="display: none;"></div>

                <div class="form-group">
                    <label class="form-label" for="email">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        required 
                        placeholder="tu-email@ejemplo.com" 
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        required 
                        placeholder="••••••••" 
                        autocomplete="current-password"
                    >
                </div>

                <div class="form-footer">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Recuérdame</span>
                    </label>
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                    <span id="loginText">Iniciar Sesión</span>
                    <div class="spinner" id="loginSpinner" style="display: none;"></div>
                </button>
            </form>

            <div class="divider">
                <p class="divider-text">
                    ¿No tienes cuenta? <a href="contact.html" class="forgot-password">Contacta al administrador</a>
                </p>
            </div>

            <div style="text-align: center;">
                <a href="../index.html" class="back-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Volver al inicio
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/background.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginForm').addEventListener('submit', async function (e) {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const errorMessage = document.getElementById('errorMessage');
                const loginBtn = document.getElementById('loginBtn');
                const loginText = document.getElementById('loginText');
                const loginSpinner = document.getElementById('loginSpinner');

                if (!email || !password) return;

                loginBtn.disabled = true;
                loginText.style.display = 'none';
                loginSpinner.style.display = 'inline-block';
                errorMessage.style.display = 'none';

                const result = await window.ERY.auth.signIn(email, password);

                if (!result.success) {
                    errorMessage.textContent = 'Credenciales inválidas. Verifica tu correo y contraseña.';
                    errorMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loginText.style.display = 'inline';
                    loginSpinner.style.display = 'none';
                } else {
                    const role = window.ERY.auth.currentProfile?.role;
                    if (role === 'administrator') {
                        window.location.href = 'dashboard-admin.html';
                    } else if (role === 'student') {
                        window.location.href = '../index.html';
                    } else {
                        window.location.href = '../index.html';
                    }
                }
            });
        });
    </script>
</body>
</html>
